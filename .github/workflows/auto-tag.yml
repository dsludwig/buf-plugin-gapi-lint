name: Auto-tag and release

on:
  pull_request:
    types: [closed]

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    if: github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'api-linter-update')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Compute release tag
        id: tag
        run: |
          TAG=$(grep 'github.com/googleapis/api-linter/v2' go.mod | awk '{print $2}')
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.tag.outputs.tag }}"
          git push origin "${{ steps.tag.outputs.tag }}"

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Extract release notes
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          awk -v tag="## ${TAG}" '
            $0 == tag { found=1; next }
            found && /^## / { exit }
            found { print }
          ' CHANGELOG.md > /tmp/release-notes.txt
          if [ ! -s /tmp/release-notes.txt ]; then
            echo "Release ${TAG}" > /tmp/release-notes.txt
          fi

      - uses: goreleaser/goreleaser-action@v6
        with:
          args: release --clean --release-notes /tmp/release-notes.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            dist/*.tar.gz
            dist/*.zip
            dist/*checksums.txt
